# ──────────────────────────────────────────────
# Plan — Research & planning configuration
# ──────────────────────────────────────────────
# Controls which external research tools are available to research agents
# (practice-seeker, lore-scholar) during /rune:devise and /rune:forge.
#
# external_research:
#   "always" — Bypass scoring, always run external research agents (Phase 1C)
#   "auto"   — Use enhanced scoring with new signals (lowered threshold 0.25) [default when set]
#   "never"  — Bypass scoring, always skip external research agents
#   When absent (no plan section), legacy thresholds (0.35) are used unchanged.
#
# research_urls:
#   Optional list of documentation URLs for research agents to fetch first.
#   URLs are sanitized (SSRF blocklist, sensitive param stripping, max 10).
#   Agents receive them wrapped in <url-list> data delimiters.
# NOTE: This file shows only the plan.external_research and plan.research_urls keys (v1.120.0+).
# For the full plan: section schema (verification_patterns, freshness, external_research),
# see talisman.example.yml in the plugin root.
plan:
  # external_research: "auto"
  # research_urls:
  #   - https://reactjs.org/docs/getting-started.html
  #   - https://docs.python.org/3/

# ──────────────────────────────────────────────
# Arc — Scheduler configuration
# ──────────────────────────────────────────────
# Controls scheduled task monitoring for arc workflows.
# When enabled, a monitoring task is created when an arc starts and
# automatically detects and resumes arcs that stop unexpectedly.
#
# Prerequisites:
#   - Claude Code >= v2.1.71 (CronCreate/CronDelete/CronList shipped in this version)
#   - CLAUDE_CODE_DISABLE_CRON is not set (env var disables scheduler entirely)
#
arc:
  scheduler:
    # Enable/disable scheduled monitoring
    enabled: true

    # Check interval in minutes (5, 10, 15, 30)
    interval_minutes: 15

    # Automatically renew tasks before 3-day expiry
    auto_renew: true

    # Renew when less than this many hours remain
    renewal_threshold_hours: 12

    # Clean orphaned tasks on session start
    cleanup_orphans_on_start: true

    auto_resume:
      # Enable automatic resume on unexpected stop
      enabled: true

      # Maximum total resume attempts per arc
      max_total_resumes: 10

      # Stop if this many consecutive failures
      max_consecutive_failures: 3

      # Wait between resume attempts
      cooldown_minutes: 5

      # Notify user when auto-resume occurs
      notify_on_resume: true
