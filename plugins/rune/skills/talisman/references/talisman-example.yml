# ──────────────────────────────────────────────
# Plan — Research & planning configuration
# ──────────────────────────────────────────────
# Controls which external research tools are available to research agents
# (practice-seeker, lore-scholar) during /rune:devise and /rune:forge.
#
# external_research:
#   "always" — Bypass scoring, always run external research agents (Phase 1C)
#   "auto"   — Use enhanced scoring with new signals (lowered threshold 0.25) [default when set]
#   "never"  — Bypass scoring, always skip external research agents
#   When absent (no plan section), legacy thresholds (0.35) are used unchanged.
#
# research_urls:
#   Optional list of documentation URLs for research agents to fetch first.
#   URLs are sanitized (SSRF blocklist, sensitive param stripping, max 10).
#   Agents receive them wrapped in <url-list> data delimiters.
# NOTE: This file shows only the plan.external_research and plan.research_urls keys (v1.120.0+).
# For the full plan: section schema (verification_patterns, freshness, external_research),
# see talisman.example.yml in the plugin root.
plan:
  # external_research: "auto"
  # research_urls:
  #   - https://reactjs.org/docs/getting-started.html
  #   - https://docs.python.org/3/

# ──────────────────────────────────────────────
# Developer Convenience Hooks — Feature Gates
# ──────────────────────────────────────────────
# Controls the 4 developer convenience hooks added in v1.157.0.
# All enabled by default. Set enabled: false to disable any hook.

# Keyword detection (UserPromptSubmit hook — KEYWORD-001)
# Intercepts prompts for magic keywords and suggests Rune workflows.
# keyword_detection:
#   enabled: true                    # Master gate for keyword-detector.sh
#   custom_keywords: {}              # Future: user-defined keyword → workflow mapping

# Tool failure tracking (PostToolUseFailure hook — FAIL-001)
# Provides escalating retry guidance after repeated tool failures.
# tool_failure_tracking:
#   enabled: true                    # Master gate for track-tool-failure.sh
#   silent_threshold: 2              # Failures before first warning (default: 2)
#   escalation_threshold: 5          # Failures before "stop retrying" (default: 5)
#   staleness_minutes: 30            # Ignore failures older than this

# Deliverable verification (SubagentStop hook — DELIV-001)
# Advisory check that completing agents produced expected output files.
# deliverable_verification:
#   enabled: true                    # Master gate for verify-agent-deliverables.sh
#   min_file_size: 200               # Minimum bytes for review/research deliverable files

# Context stop guard (Stop hook — CTX-STOP-001)
# Warns when context usage exceeds threshold at conversation stop.
# Reads the statusline bridge file (consistent with guard-context-critical.sh).
# Placed LAST in Stop array — exits silently when arc loop is active.
# context_stop_guard:
#   enabled: true                    # Master gate for context-percent-stop-guard.sh
#   warning_threshold: 70            # % context usage for advisory warning (exit 2)
#   high_threshold: 85               # % context usage for strong warning (exit 2)
#   max_blocks_per_session: 2        # Prevent infinite block loops

# ──────────────────────────────────────────────
# PR Comment Output — Post findings to GitHub PR
# ──────────────────────────────────────────────
# Controls the /rune:post-findings skill behavior.
# When enabled, review/audit findings can be posted as GitHub PR comments.
# Requires gh CLI authenticated with repo write access.
#
# pr_comment:
#   enabled: false                     # Master gate for PR comment posting (opt-in)
#   severity_filter: ["P1", "P2"]      # Only post findings at these severity levels
#   confidence_threshold: 50           # Minimum confidence score (0-100) to include finding
#   max_findings: 30                   # Maximum findings to include in comment
#   format: "summary"                  # Output format: "summary" | "detailed" | "minimal"
#   include_traces: true               # Include Rune Traces (file:line evidence)
#   include_fix_suggestions: true      # Include fix suggestions from findings
#   collapse_threshold: 5              # Collapse findings list into <details> after this count
#   footer: true                       # Include Rune version footer in comment

# ──────────────────────────────────────────────
# Arc — Crash Recovery Configuration
# ──────────────────────────────────────────────
# Arc crash recovery uses SessionStart hook detection (v1.145.0):
#   When a session crashes (OOM, terminal closure, machine reboot),
#   session-team-hygiene.sh detects orphaned checkpoints on next
#   session start and advises user to resume via /rune:arc --resume.
#
# No configuration needed — SessionStart recovery runs automatically.
# Use /rune:arc --resume for manual recovery at any time.
# Arc runtime settings (defaults, ship, pre_merge_checks) are resolved
# in arc-checkpoint-init.md via 3-layer config resolution.

# ──────────────────────────────────────────────
# Discipline — Proof validation configuration
# ──────────────────────────────────────────────
# Controls the discipline proof validation hook (validate-discipline-proofs.sh).
# When enabled, TaskCompleted hook validates evidence exists and proofs pass
# before allowing workers to mark tasks complete.
#
# Default: WARN mode (block_on_fail: false) — warnings only during rollout.
# Set block_on_fail: true for BLOCK mode after validation confidence is established.
discipline:
  # enabled: true              # Enable discipline proof validation
  # block_on_fail: false       # WARN mode (default for rollout). Set true for BLOCK mode.
  # proof_timeout: 60          # Timeout in seconds for individual proof execution
  # max_convergence_iterations: 3  # Max proof retry attempts before escalation
  # echo_back_required: true   # Require workers to echo-back acceptance criteria

# ──────────────────────────────────────────────
# Design Sync — Figma design synchronization
# ──────────────────────────────────────────────
# Controls the design sync pipeline (extraction → implementation → fidelity review).
# When enabled, arc runs design phases (3, 3.5, 5.2, 7.6).
# Requires FIGMA_ACCESS_TOKEN for Figma API access.
#
# design_sync:
#   enabled: false                     # Master gate for all design phases (opt-in)
#   iterate_enabled: true              # Enable design iteration phase (7.6)
#   fidelity_threshold: 80             # Score threshold for fidelity PASS (0-100)
#   max_iterations: 3                  # Max screenshot→fix iterations per component
#   max_iteration_workers: 2           # Parallel design iteration workers
#   base_url: "http://localhost:3000"  # Storybook/dev server URL (localhost only — SEC-003)
#
#   # Design discipline — nested under design_sync to avoid naming collision
#   # with top-level discipline: (code proofs) and design_review: (reviewer agents).
#   # Auto-enabled when design_sync.enabled is true.
#   discipline:
#     enabled: true                    # Auto-true when design_sync.enabled; set false to disable
#     block_on_fail: false             # Advisory by default — design failures don't block pipeline
#     proof_types:                     # Which design proofs to run per DES- criterion
#       token_scan: true               # Always available (bash grep — no tool dependency)
#       story_exists: true             # Always available (bash find — no tool dependency)
#       axe_passes: auto               # Auto-detect: requires storybook + @storybook/test-runner
#       storybook_renders: auto        # Auto-detect: requires storybook running at base_url
#       screenshot_diff: auto          # Auto-detect: requires agent-browser CLI
#       responsive_check: auto         # Auto-detect: requires agent-browser CLI
#     fidelity_threshold: 0.8          # Secondary convergence gate (backward compat score threshold)
#     max_iterations: 3                # Max design convergence iterations before F15 (budget exceeded)
#
# Proof type auto-detect behavior:
#   "true"  — Always run this proof type (fail if tool unavailable)
#   "auto"  — Run if tool detected at runtime; skip with INCONCLUSIVE if unavailable (F4 graceful degradation)
#   "false" — Never run this proof type
#
# ──────────────────────────────────────────────
# Self-Audit — Meta-QA for Rune itself (/rune:self-audit)
# ──────────────────────────────────────────────
# self_audit:
#   enabled: true                    # Enable /rune:self-audit command (default: true)
#   auto_suggest_threshold: 3        # Suggest self-audit after N marginal QA scores (future Phase 2)
#   echo_persist: true               # Persist findings to .rune/echoes/meta-qa/ (default: true)
#   promotion_threshold: 3           # Promote to Inscribed after N recurrences (default: 3)
#   verbose_default: false           # Include P3 findings by default (default: false)
